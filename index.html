
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nothing</title>
    <style>
        body {
            font-family: monospace, Arial, sans-serif;
            margin: 0;
            padding: 30px;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }
        #wrapper {
            max-width: 800px;
            margin: auto;
        }
        h1 {
            font-size: 2.5em;
            text-align: center;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff;
            border-bottom: 2px solid #fff;
            padding-bottom: 10px;
            animation: flicker 3s infinite;
        }
        img {
            display: block;
            margin: 20px auto;
            width: 200px;
            height: auto;
        }
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.4; }
        }
        .tema {
            margin-bottom: 50px;
        }
        .tema h2 {
            font-size: 1.5em;
            border-bottom: 1px dashed #fff;
            padding-bottom: 5px;
        }
        .tema p {
            font-size: 1em;
            margin-top: 10px;
            line-height: 1.5em;
        }
        canvas.bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            display: none;
        }
        #snakeGame {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: none;
            background: #000;
            border: 3px solid #fff;
            padding: 10px;
        }
    </style>
</head>
<body>
<canvas id="asciiRain" class="bg-canvas"></canvas>

<div id="wrapper">
    <h1>Nothing</h1>
    <img src="skull.gif" alt="skull">
    <div class="tema">
        <h2>Introducción al Hacking Ético</h2>
        <p>Conceptos básicos y principios del hacking responsable.</p>
    </div>
    <div class="tema">
        <h2>Herramientas de Pentesting</h2>
        <p>Exploración de herramientas populares para pruebas de penetración.</p>
    </div>
    <div class="tema">
        <h2>Exploits y Vulnerabilidades</h2>
        <p>Discusión sobre vulnerabilidades conocidas y exploits recientes.</p>
    </div>
</div>

<canvas id="snakeGame" width="400" height="400"></canvas>

<script>
// Lluvia ☠ intacta
const canvas = document.getElementById('asciiRain');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let fontSize = 16;
let columns = Math.floor(canvas.width / fontSize);
let drops = Array(columns).fill().map(() => Math.random() * -20);
let rainActive = false;

function drawRain() {
  if (!rainActive) return;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff';
  ctx.font = fontSize + 'px monospace';
  for (let i = 0; i < drops.length; i++) {
    const text = '☠';
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) { drops[i] = 0; }
    drops[i]++;
  }
}
setInterval(drawRain, 35);
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  columns = Math.floor(canvas.width / fontSize);
  drops = Array(columns).fill().map(() => Math.random() * -20);
});
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'm') {
    rainActive = !rainActive;
    canvas.style.display = rainActive ? 'block' : 'none';
  }
});

// Snake Nokia intacto
const snakeCanvas = document.getElementById('snakeGame');
const sctx = snakeCanvas.getContext('2d');
let box = 20, snake, direction, food, score, running = false, started = false, flickerInterval;
const snakeColor = '#A6C48A';
const foodColor = '#FF3B30';

function showStartScreen() {
  sctx.fillStyle = "#000";
  sctx.fillRect(0, 0, 400, 400);
  sctx.fillStyle = "#fff";
  sctx.font = "30px monospace";
  sctx.textAlign = "center";
  sctx.fillText("PRESS START", 200, 200);
  if (flickerInterval) clearInterval(flickerInterval);
  flickerInterval = setInterval(() => {
    sctx.clearRect(0, 180, 400, 40);
    sctx.fillStyle = "#fff";
    sctx.fillText("PRESS START", 200, 200);
  }, 1000);
}

function showGameOver() {
  sctx.fillStyle = "#000";
  sctx.fillRect(0, 0, 400, 400);
  sctx.fillStyle = "#fff";
  sctx.font = "30px monospace";
  sctx.textAlign = "center";
  sctx.fillText("GAME OVER", 200, 180);
  sctx.font = "16px monospace";
  sctx.fillText("Press Space to Restart", 200, 220);
}

function startGame() {
  clearInterval(flickerInterval);
  snake = [{x: 9*box, y: 10*box}];
  direction = "RIGHT";
  food = { x: Math.floor(Math.random()*20)*box, y: Math.floor(Math.random()*20)*box };
  score = 0;
  running = true;
  started = true;
  if(window.snakeLoop) clearInterval(window.snakeLoop);
  window.snakeLoop = setInterval(drawSnake, 120);
}

function drawSnake() {
  sctx.fillStyle = "#000";
  sctx.fillRect(0,0,400,400);
  for(let i=0; i<snake.length; i++) {
    sctx.fillStyle = snakeColor;
    sctx.fillRect(snake[i].x, snake[i].y, box, box);
  }
  sctx.fillStyle = foodColor;
  sctx.fillRect(food.x, food.y, box, box);
  let headX = snake[0].x;
  let headY = snake[0].y;
  if(direction == "LEFT") headX -= box;
  if(direction == "UP") headY -= box;
  if(direction == "RIGHT") headX += box;
  if(direction == "DOWN") headY += box;

  if(headX == food.x && headY == food.y) {
    score++;
    food = { x: Math.floor(Math.random()*20)*box, y: Math.floor(Math.random()*20)*box };
  } else {
    snake.pop();
  }

  let newHead = {x: headX, y: headY};

  if(headX < 0 || headY < 0 || headX >= 400 || headY >= 400 || collision(newHead, snake)) {
    clearInterval(window.snakeLoop);
    running = false;
    started = false;
    showGameOver();
  }
  snake.unshift(newHead);

  sctx.fillStyle = "#fff";
  sctx.font = "16px monospace";
  sctx.fillText("Score: " + score, 50, 20);
}

function collision(head, array) {
  for(let i=0; i<array.length; i++) {
    if(head.x == array[i].x && head.y == array[i].y) return true;
  }
  return false;
}

document.addEventListener("keydown", function(e) {
  if(!running && e.code === "Space" && !started) startGame();
  if(e.key == "ArrowLeft" && direction != "RIGHT") direction = "LEFT";
  else if(e.key == "ArrowUp" && direction != "DOWN") direction = "UP";
  else if(e.key == "ArrowRight" && direction != "LEFT") direction = "RIGHT";
  else if(e.key == "ArrowDown" && direction != "UP") direction = "DOWN";
});

document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'x') {
    if (snakeCanvas.style.display === 'block') {
      snakeCanvas.style.display = 'none';
      clearInterval(flickerInterval);
    } else {
      snakeCanvas.style.display = 'block';
      showStartScreen();
    }
  }
});
</script>

</body>
</html>
