
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nothing</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }
        #container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }
        h1 {
            margin-top: 20px;
            font-size: 2.5em;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff;
            border-bottom: 2px solid #fff;
            padding-bottom: 10px;
            animation: flicker 3s infinite;
        }
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.4; }
        }
        .tema {
            margin: 20px 0;
            padding: 15px;
            background-color: #fff;
            color: #000;
            border: 2px solid #000;
            border-radius: 8px;
            transition: background-color 0.3s;
        }
        .tema a {
            text-decoration: none;
            color: #000;
            font-weight: bold;
            font-size: 1.2em;
        }
        .tema p {
            margin-top: 8px;
            font-size: 0.95em;
        }
        .tema:hover {
            background-color: #f5f5f5;
            animation: shake 0.4s;
        }
        @keyframes shake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-2px, 2px); }
            100% { transform: translate(0, 0); }
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }
        img {
            width: 200px;
            height: auto;
        }
    </style>
</head>
<body>
<canvas id="asciiRain"></canvas>
<div id="container">
    <img src="skull.gif" alt="skull">
    <h1>Nothing</h1>
    <div class="tema">
        <a href="tema1.html">Introducción al Hacking Ético</a>
        <p>Conceptos básicos y principios del hacking responsable.</p>
    </div>
    <div class="tema">
        <a href="tema2.html">Herramientas de Pentesting</a>
        <p>Exploración de herramientas populares para pruebas de penetración.</p>
    </div>
    <div class="tema">
        <a href="tema3.html">Exploits y Vulnerabilidades</a>
        <p>Discusión sobre vulnerabilidades conocidas y exploits recientes.</p>
    </div>
</div>

<script>
const canvas = document.getElementById('asciiRain');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let fontSize = 16;
let columns = Math.floor(canvas.width / fontSize);
let drops = Array(columns).fill().map(() => Math.random() * -20);

let normalChars = ['☠'];
let hackerChars = ['☠','𓂀','⚔','☢','▓','█','▒','░','@','#','$','%','&','*'];
let currentCharset = normalChars;

function draw() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  ctx.fillStyle = '#fff';
  ctx.font = fontSize + 'px monospace';

  for (let i = 0; i < drops.length; i++) {
    const text = currentCharset[Math.floor(Math.random() * currentCharset.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }
}

setInterval(draw, 35);

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  columns = Math.floor(canvas.width / fontSize);
  drops = Array(columns).fill().map(() => Math.random() * -20);
});

document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'm') {
    currentCharset = (currentCharset === normalChars) ? hackerChars : normalChars;
  }
});
</script>

</body>
</html>
